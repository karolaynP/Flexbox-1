<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>los simpsons</h1>
    <main class="container">
        <div class="row">
            <div class="col-4 d-flex justify-content-start" style="background-color: azure;">
                <img src="Imagenes/homero.jpg" alt="homero simpsons" width="300">
            </div>  
             <div class="col-4 d-flex justify-content-start" style="background-color: azure;">

             <div class="col-4 d-flex justify-content-start" style="background-color: azure;">

            <div class="col-6 d-flex justify-content-start" style="background-color: beige;">
                <img src="Imagenes/bart.jpg" alt="bart simpsons" width="300">
            </div>      
             <div class="col-6 d-flex justify-content-start" style="background-color: beige;">
                <img src="Imagenes/lisa (3).jpeg" alt="lisa simpsons" width="350">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
